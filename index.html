<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Литературни връзки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,700&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="stage">
    <section class="works-column" aria-label="Избрани творби">
      <section class="side side-top" aria-label="Първа творба">
        <label class="picker" for="work-left">
          <span class="picker-label">Първа творба</span>
          <select id="work-left" name="work-left">
            <option value="">Избери</option>
          </select>
        </label>

        <div id="left-card" class="work-card"></div>
      </section>

      <section class="side side-bottom" aria-label="Втора творба">
        <label class="picker" for="work-right">
          <span class="picker-label">Втора творба</span>
          <select id="work-right" name="work-right">
            <option value="">Избери</option>
          </select>
        </label>

        <div id="right-card" class="work-card"></div>
      </section>
    </section>

    <section class="bridge" aria-label="Връзка между творбите">
      <p id="connection-text" class="connection-text is-placeholder">Избери две различни творби.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p class="site-footer-text">Направено от Натаниел Нечевски и Михаил Георгиев</p>
  </footer>

  <script src="js/data/works.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
